<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory Overlay</title>
  </head>
  <body>
    <div id="root">
      <main class="inventory" aria-label="Inventory">
        <header>
          <strong>Inventory</strong>
          <span class="gold">42g</span>
        </header>
        <div class="items" role="list">
          <button aria-pressed="true" class="item" data-item-id="potion" type="button">
            <img alt="" src="./potion.svg">
            <span>Potion</span>
          </button>
          <button aria-pressed="false" class="item" data-item-id="key" type="button">
            <img alt="" src="./key.svg">
            <span>Gate Key</span>
          </button>
          <button aria-pressed="false" class="item" data-item-id="shield" type="button">
            <img alt="" src="./shield.svg">
            <span>Ward</span>
          </button>
        </div>
      </main>
    </div>
    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
